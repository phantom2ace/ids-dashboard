version: '3.8'

services:
  soc-platform:
    build: .
    container_name: idssd-soc-platform
    ports:
      - "5000:5000"
    volumes:
      - ./alerts.db:/app/alerts.db
      - ./config.json:/app/config.json
      - ./logs:/app/logs
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - TZ=UTC
