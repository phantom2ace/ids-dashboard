version: '3.8'

services:
  soc-platform:
    build: .
    container_name: idssd-soc-platform
    ports:
      - "5000:5000"
    volumes:
      - ./alerts.db:/app/alerts.db
      - ./config.json:/app/config.json
      - ./logs:/app/logs
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - TZ=UTC

  sensor-oakridge:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: idssd-sensor-oakridge
    command: python3 sensor_agent.py
    restart: unless-stopped
    depends_on:
      - soc-platform
    environment:
      - SOC_DASHBOARD_URL=http://soc-platform:5000/api/predict
      - AGENT_API_KEY=oakridge_api_123

  sensor-mercy:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: idssd-sensor-mercy
    command: python3 sensor_agent.py
    restart: unless-stopped
    depends_on:
      - soc-platform
    environment:
      - SOC_DASHBOARD_URL=http://soc-platform:5000/api/predict
      - AGENT_API_KEY=mercy_api_123
