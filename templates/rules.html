{% extends "layout.html" %}

{% block content %}
<div class="mb-6 flex justify-between items-end">
    <div>
        <h2 class="text-2xl font-bold text-slate-900 dark:text-white">IPS Signatures</h2>
        <p class="text-slate-500 text-sm">Active Suricata intrusion prevention rules</p>
    </div>
    <div class="text-xs text-slate-500 uppercase tracking-widest font-bold">
        Root > IDSSD > Rules
    </div>
</div>

<div class="grid grid-cols-1 gap-6">
    <!-- Rules Viewer Widget -->
    <div class="bg-white dark:bg-[#1c222d] border border-slate-200 dark:border-slate-800 rounded shadow-lg overflow-hidden flex flex-col h-[600px]">
        <div class="px-4 py-2 border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-[#242b38] flex justify-between items-center shrink-0">
            <h3 class="text-[10px] font-bold text-slate-600 dark:text-slate-300 uppercase tracking-wider">Active Rule Configuration</h3>
            <div class="flex space-x-2">
                <span class="text-[10px] text-green-500 font-bold uppercase">LIVE</span>
            </div>
        </div>
        <div class="p-0 flex-1 overflow-hidden bg-slate-100 dark:bg-[#0a0c10]">
            <textarea readonly class="w-full h-full bg-transparent text-slate-800 dark:text-slate-300 font-mono text-xs p-6 outline-none resize-none custom-scrollbar" style="white-space: pre-wrap;">{{ rules }}</textarea>
        </div>
        <div class="px-4 py-3 border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-[#242b38] flex justify-end space-x-3 shrink-0">
            <p class="text-xs text-slate-500">Edit rules in `/etc/suricata/rules/local.rules` and restart the service to apply changes.</p>
        </div>
    </div>
</div>
{% endblock %}
