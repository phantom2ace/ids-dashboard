{% extends "layout.html" %}

{% block content %}
<div class="mb-6 flex justify-between items-end">
    <div>
        <h2 class="text-2xl font-bold text-slate-900 dark:text-white uppercase tracking-wider flex items-center">
            <svg class="w-6 h-6 mr-2 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
            Compliance & Reports
        </h2>
    </div>
    <div class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">
        Root > IDSSD > Reports
    </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
    <!-- Generate Report Widget -->
    <div class="bg-white dark:bg-[#1c222d] border border-slate-200 dark:border-slate-800 rounded shadow-lg p-6">
        <h3 class="text-sm font-bold text-slate-600 dark:text-slate-300 uppercase tracking-wider mb-4 border-b border-slate-800 pb-2">Generate Custom Report</h3>
        
        <form class="space-y-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Report Type</label>
                <select id="reportType" class="w-full bg-[#141820] border border-slate-700 text-slate-300 text-xs rounded px-3 py-2 focus:outline-none focus:border-yellow-500">
                    <option value="pdf_summary">Executive Threat Summary (PDF)</option>
                    <option value="csv_audit">Incident Audit Log (CSV)</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Start Date</label>
                    <input type="date" id="startDate" class="w-full bg-[#141820] border border-slate-700 text-slate-300 text-xs rounded px-3 py-2 focus:outline-none focus:border-yellow-500">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">End Date</label>
                    <input type="date" id="endDate" class="w-full bg-[#141820] border border-slate-700 text-slate-300 text-xs rounded px-3 py-2 focus:outline-none focus:border-yellow-500">
                </div>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Tenant Filter</label>
                <select id="tenantFilter" class="w-full bg-[#141820] border border-slate-700 text-slate-300 text-xs rounded px-3 py-2 focus:outline-none focus:border-yellow-500">
                    <option value="All">All Tenants</option>
                    <option value="School A">School A</option>
                    <option value="Hospital B">Hospital B</option>
                </select>
            </div>
            <div class="pt-2">
                <button type="button" onclick="generateReport()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white px-4 py-2 rounded text-xs uppercase font-bold tracking-wider transition-colors flex justify-center items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                    Generate & Download
                </button>
            </div>
        </form>
    </div>

    <!-- Automated Reports -->
    <div class="bg-white dark:bg-[#1c222d] border border-slate-200 dark:border-slate-800 rounded shadow-lg flex flex-col">
        <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-[#242b38]">
            <h3 class="text-sm font-bold text-slate-600 dark:text-slate-300 uppercase tracking-wider">Scheduled Reports</h3>
        </div>
        <div class="p-6 flex-1 overflow-y-auto">
            <ul class="space-y-4">
                <li class="flex justify-between items-center bg-[#141820] p-4 rounded border border-slate-700/50">
                    <div class="flex items-center">
                        <div class="bg-red-900/30 p-2 rounded mr-4">
                            <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
                        </div>
                        <div>
                            <h4 class="text-xs font-bold text-slate-300">Weekly Executive Summary.pdf</h4>
                            <p class="text-[10px] text-slate-500 font-mono mt-1">Generated: 2026-05-20 00:00:00</p>
                        </div>
                    </div>
                    <button class="text-slate-400 hover:text-white transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg></button>
                </li>
                <li class="flex justify-between items-center bg-[#141820] p-4 rounded border border-slate-700/50">
                    <div class="flex items-center">
                        <div class="bg-green-900/30 p-2 rounded mr-4">
                            <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                        </div>
                        <div>
                            <h4 class="text-xs font-bold text-slate-300">Incident Audit Log (May).csv</h4>
                            <p class="text-[10px] text-slate-500 font-mono mt-1">Generated: 2026-05-01 00:00:00</p>
                        </div>
                    </div>
                    <button class="text-slate-400 hover:text-white transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg></button>
                </li>
            </ul>
        </div>
    </div>
    </div>
</div>

<script>
function generateReport() {
    const reportType = document.getElementById('reportType').value;
    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    const tenantFilter = document.getElementById('tenantFilter').value;

    const params = new URLSearchParams({
        type: reportType,
        start_date: startDate,
        end_date: endDate,
        tenant: tenantFilter
    });

    window.location.href = '/api/reports/generate?' + params.toString();
}
</script>
{% endblock %}
